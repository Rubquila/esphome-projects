# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Comedero Fallback Hotspot"
    password: ""

captive_portal:

#deep_sleep:
#  id: sleep1
#  run_duration: 120s
#  sleep_duration: 120s

# Example configuration entry
servo:
  - id: motor
    output: servo_output
    
rtttl:
  output: buzzer

output:
  - platform: esp8266_pwm
    id: servo_output
    pin: D2
    frequency: 50 Hz

  - platform: esp8266_pwm
    pin: D8
    id: buzzer

time:
  - platform: homeassistant
    timezone: Europe/Madrid
    id: homeassistant_time
    
  - platform: sntp
    id: sntp_time
    on_time:
      - seconds: 0
        minutes: 30
        hours: 10
        days_of_week: SUN-SAT
        then:
          - script.execute: servir_comida
              
      - seconds: 0
        minutes: 0
        hours: 15
        days_of_week: SUN-SAT
        then:
          - script.execute: servir_comida
              
      - seconds: 0
        minutes: 30
        hours: 21
        days_of_week: SUN-SAT
        then:
          - script.execute: servir_comida
              
sensor:
  #- platform: uptime
  #  name: "Ultima conexion"

  - platform: wifi_signal
    name: "Comedero WiFi Signal"
    device_class: "signal_strength"
    update_interval: 30min
    
  - platform: ultrasonic
    trigger_pin: D6
    echo_pin: D7
    name: "Nivel de comida"
    update_interval: 60min
    filters:
    - filter_out: nan
    #- median:
    - calibrate_linear:
      - 0.21 -> 0.0
      - 0.05 -> 100.0
    - lambda: |-
        if (x  < 0.0) return 0.0;
        if (x > 100.0) return 100.0;
        return x;
    # Calculates in %
    # Replace 0.23 by the height of your container. From the sensor to the bottom.
    # I used this website to know how I should multiply my values :https://www.skillsyouneed.com/num/percent-change.html 
    #- lambda: return (0.30-x)*(100/0.30);
    accuracy_decimals: 0
    unit_of_measurement: "%"
    on_value_range:
      below: 20
      then:
        - rtttl.play: low:d=4,o=5,b=100:20g,8p,20g,8p,20g,8p,20g,8p,20g
    
  - platform: adc
    pin: A0
    name: "Voltaje"
    device_class: "voltage"
    update_interval: 10min
    accuracy_decimals: 2
    unit_of_measurement: "V"
    filters:
      - multiply: 1000
    #  - lambda: return x + 1;
    #on_value_range:
    #  below: 2.5
    #  then:
    #    - rtttl.play: alarm:d=4,o=5,b=100:16a,8e,16a,8e,16a,8e,16a,8e,16a,8e,16a,8e,16a,8e
    
binary_sensor:
  - platform: gpio
    pin: GPIO0
    id: btn_servir
    device_class: moving
    internal: true
    on_press:
      then:
        - script.execute: servir_comida
        
text_sensor:
  - platform: template
    name: "Última dispensación"
    id: ultimaDispensacion
    update_interval: 60min

button:
  - platform: restart
    name: "Reiniciar comedero"
    
  - platform: template
    id: servir
    name: "Dispensar comida"
    on_press:
      then:
        - script.execute: servir_comida
 
script:
  - id: servir_comida
    then:
      - rtttl.play: secret-zelda:d=4,o=5,b=140:8g6,18f#6,18d#6,18a,18g#,18e6,18g#6,18c7
      - delay: 1500ms
      - servo.write:
            id: motor
            level: 90%
      - delay: 400ms
      - servo.write:
            id: motor
            level: 0%
      - text_sensor.template.publish:
          id: ultimaDispensacion
          #Genera la fecha y hora
          state: !lambda 'char str[17]; time_t currTime = id(sntp_time).now().timestamp; strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime)); return { str };'
      
